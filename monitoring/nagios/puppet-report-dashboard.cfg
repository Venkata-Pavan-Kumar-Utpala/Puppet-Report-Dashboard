# Nagios Configuration - Puppet Report Dashboard
# CSE3253 DevOps | Venkata Pavan Kumar Utpala | 23FE10CSE00388

define host {
    use                   linux-server
    host_name             puppet-report-dashboard-app
    alias                 Puppet Report Dashboard Application
    address               127.0.0.1
    max_check_attempts    3
    check_period          24x7
    notification_interval 30
    notification_period   24x7
}

define service {
    use                   generic-service
    host_name             puppet-report-dashboard-app
    service_description   HTTP Health Check
    check_command         check_http!-p 8080 -u /api/health
    max_check_attempts    3
    check_interval        1
    retry_interval        1
    notification_interval 5
}

define service {
    use                   generic-service
    host_name             puppet-report-dashboard-app
    service_description   Report Receiver Endpoint
    check_command         check_http!-p 8080 -u /api/reports
    max_check_attempts    3
    check_interval        5
}

define service {
    use                   generic-service
    host_name             puppet-report-dashboard-app
    service_description   CPU Usage
    check_command         check_nrpe!check_cpu
    max_check_attempts    3
    check_interval        5
}

define service {
    use                   generic-service
    host_name             puppet-report-dashboard-app
    service_description   Memory Usage
    check_command         check_nrpe!check_mem
    max_check_attempts    3
    check_interval        5
}

define contact {
    contact_name          devops-admin
    alias                 DevOps Admin
    email                 23FE10CSE00388@student.example.edu
    service_notification_period    24x7
    host_notification_period       24x7
    service_notification_options   w,u,c,r
    host_notification_options      d,u,r
    service_notification_commands  notify-service-by-email
    host_notification_commands     notify-host-by-email
}
