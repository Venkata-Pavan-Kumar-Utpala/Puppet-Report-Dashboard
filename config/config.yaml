# Application Configuration
# Puppet Report Dashboard - CSE3253 DevOps Project

app:
  name: "Puppet Report Dashboard"
  version: "1.0.0"
  port: 8080
  environment: development

server:
  host: "0.0.0.0"
  port: 8080
  request_timeout: 30000

database:
  host: ${DB_HOST}
  port: ${DB_PORT}
  name: "puppetdb"
  user: "puppetuser"
  pool:
    min: 2
    max: 10

puppet:
  report_format: "json"        # json or yaml
  max_report_age_days: 30      # purge reports older than this
  polling_interval_seconds: 60

alerts:
  email:
    enabled: true
    smtp_host: "smtp.gmail.com"
    smtp_port: 587
    from: ${ALERT_EMAIL}
  slack:
    enabled: true
    webhook_url: ${SLACK_WEBHOOK_URL}
  triggers:
    - event: "run_failed"
      channels: [email, slack]
    - event: "node_unreported"
      threshold_hours: 2
      channels: [email]

logging:
  level: "info"
  format: "json"
  file: "logs/app.log"
  max_size_mb: 10
  max_files: 5

security:
  cors_origins:
    - "http://localhost:8080"
    - "http://localhost:3000"
  rate_limit:
    window_ms: 900000
    max_requests: 100
